<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mes Courses</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --accent-blue: #007aff;
            --text-main: #1c1c1e;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            padding: 20px;
            color: var(--text-main);
        }

        .container { max-width: 500px; margin: auto; }

        h1 { font-weight: 800; font-size: 28px; margin-bottom: 20px; color: #000; }

        .category-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* Couleurs par catégories */
        .cat-fruits { border-left: 5px solid #ff9500; }
        .cat-epicerie { border-left: 5px solid #5856d6; }
        .cat-frais { border-left: 5px solid #34c759; }
        .cat-maison { border-left: 5px solid #ff2d55; }

        h2 { font-size: 18px; margin-top: 0; margin-bottom: 12px; display: flex; align-items: center; }

        .item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f2f2f7;
            cursor: pointer;
            transition: all 0.2s;
        }

        .item:last-child { border-bottom: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: var(--accent-blue);
        }

        input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: #8e8e93;
        }

        span { font-size: 17px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Mes Courses 🛒</h1>

    <div class="category-card cat-fruits">
        <h2>🍎 Fruits & Légumes</h2>
        <label class="item"><input type="checkbox"> <span>Oranges</span></label>
        <label class="item"><input type="checkbox"> <span>Bananes</span></label>
        <label class="item"><input type="checkbox"> <span>Carottes</span></label>
        <label class="item"><input type="checkbox"> <span>Oignons</span></label>
    </div>

    <div class="category-card cat-epicerie">
        <h2>🥫 Épicerie</h2>
        <label class="item"><input type="checkbox"> <span>Lentilles</span></label>
        <label class="item"><input type="checkbox"> <span>Lait de coco</span></label>
        <label class="item"><input type="checkbox"> <span>Riz / Pâtes</span></label>
        <label class="item"><input type="checkbox"> <span>Conserves de tomates</span></label>
    </div>

    <div class="category-card cat-frais">
        <h2>🥛 Frais & Végétal</h2>
        <label class="item"><input type="checkbox"> <span>Œufs</span></label>
        <label class="item"><input type="checkbox"> <span>Yaourts</span></label>
        <label class="item"><input type="checkbox"> <span>Tofu / Lait végétal</span></label>
        <label class="item"><input type="checkbox"> <span>Beurre</span></label>
    </div>

    <div class="category-card cat-maison">
        <h2>🧼 Maison & Animaux</h2>
        <label class="item"><input type="checkbox"> <span>Produits ménagers</span></label>
        <label class="item"><input type="checkbox"> <span>Nourriture animaux</span></label>
        <label class="item"><input type="checkbox"> <span>Papier toilette</span></label>
    </div>
</div>

</body>
</html>
