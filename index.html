<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Liste Intelligente</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --blue: #007aff;
            --gray: #8e8e93;
            --orange: #ff9500;
            --purple: #5856d6;
            --green: #34c759;
            --red: #ff2d55;
        }

        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; padding-bottom: 100px; }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }

        .category-section { background: var(--card); border-radius: 14px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        
        .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .cat-header h2 { font-size: 17px; margin: 0; }
        
        /* Styles couleurs par catégorie */
        .fruits h2 { color: var(--orange); }
        .epicerie h2 { color: var(--purple); }
        .frais h2 { color: var(--green); }
        .maison h2 { color: var(--red); }

        .add-btn { background: #eee; border: none; border-radius: 50%; width: 28px; height: 28px; font-weight: bold; cursor: pointer; color: #555; }

        .item-list { list-style: none; padding: 0; margin: 0; }
        .item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; animation: fadeIn 0.3s; }
        .item:last-child { border-bottom: none; }
        
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 12px; accent-color: var(--blue); }
        
        #panier-section { background: #e5e5ea; border: 2px dashed var(--gray); }
        #panier-section h2 { color: var(--gray); }
        .checked-item span { text-decoration: line-through; color: var(--gray); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>Courses Leclerc 🛒</h1>

    <div id="categories-container">
        <!-- Catégories -->
        <div class="category-section fruits" data-cat="fruits">
            <div class="cat-header"><h2>🍎 Fruits & Légumes</h2><button class="add-btn" onclick="addItem('fruits')">+</button></div>
            <div class="item-list" id="list-fruits"></div>
        </div>

        <div class="category-section epicerie" data-cat="epicerie">
            <div class="cat-header"><h2>🥫 Épicerie</h2><button class="add-btn" onclick="addItem('epicerie')">+</button></div>
            <div class="item-list" id="list-epicerie"></div>
        </div>

        <div class="category-section frais" data-cat="frais">
            <div class="cat-header"><h2>🥛 Frais & Végétal</h2><button class="add-btn" onclick="addItem('frais')">+</button></div>
            <div class="item-list" id="list-frais"></div>
        </div>

        <div class="category-section maison" data-cat="maison">
            <div class="cat-header"><h2>🧼 Maison & Animaux</h2><button class="add-btn" onclick="addItem('maison')">+</button></div>
            <div class="item-list" id="list-maison"></div>
        </div>
    </div>

    <!-- Section Panier -->
    <div class="category-section" id="panier-section">
        <div class="cat-header"><h2>🛒 Mon Panier (À acheter)</h2></div>
        <div class="item-list" id="list-panier"></div>
    </div>

<script>
    // Initialisation avec tes données
    const initialData = {
        fruits: ["Oranges", "Bananes", "Carottes"],
        epicerie: ["Lentilles", "Lait de coco", "Pâtes"],
        frais: ["Œufs", "Yaourts", "Tofu"],
        maison: ["Lessive", "Croquettes"]
    };

    function renderInitial() {
        for (let cat in initialData) {
            initialData[cat].forEach(name => createItemHTML(name, cat));
        }
    }

    function createItemHTML(name, cat) {
        const list = document.getElementById(`list-${cat}`);
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
            <input type="checkbox" onchange="toggleItem(this, '${cat}')">
            <span>${name}</span>
        `;
        list.appendChild(div);
    }

    function addItem(cat) {
        const name = prompt("Nom de l'aliment ?");
        if (name) createItemHTML(name, cat);
    }

    function toggleItem(checkbox, originalCat) {
        const itemDiv = checkbox.parentElement;
        const panier = document.getElementById('list-panier');
        const originalList = document.getElementById(`list-${originalCat}`);

        if (checkbox.checked) {
            itemDiv.classList.add('checked-item');
            panier.appendChild(itemDiv);
        } else {
            itemDiv.classList.remove('checked-item');
            originalList.appendChild(itemDiv);
        }
    }

    renderInitial();
</script>

</body>
</html>
